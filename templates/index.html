<!DOCTYPE html>
<html>
<head>
    <title>DevOps AI Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center mb-4">🤖 DevOps AI Assistant</h1>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Ask a Question</label>

                <input
                    type="text"
                    name="question"
                    class="form-control"
                    placeholder="Ask anything..."
                    required>
            </div>

            <button type="submit" class="btn btn-primary">
                Send
            </button>

        </form>

        {% if question %}
        <div class="mt-4">

            <h4>Your Question:</h4>
            <div class="alert alert-secondary">
                {{ question }}
            </div>

            <h4>Assistant:</h4>
            <div class="alert alert-success">
                {{ answer }}
            </div>

        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
